<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Auditoría Visores — Delibreads</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');
  :root{
    --bg:#f5f4f0;--surface:#fff;--border:#e0ddd6;--text:#1a1916;--muted:#6b6860;
    --accent:#1a5c3a;--accent-l:#e8f3ed;--danger:#b83232;--danger-l:#fdf0f0;
    --warn:#8a6000;--warn-l:#fef9ec;--gray:#9a9790;--gray-l:#f0efe9;
    --blue:#1e4d8c;--blue-l:#edf2fb;--r:10px;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* HEADER */
  .hdr{background:var(--accent);padding:.85rem 1.1rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20;}
  .hdr-logo{width:34px;height:34px;background:rgba(255,255,255,.18);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .hdr h1{font-size:14px;font-weight:600;color:#fff;}
  .hdr p{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px;}

  .wrap{padding:1.1rem;max-width:680px;margin:0 auto;}

  /* CARD */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;box-shadow:var(--shadow);margin-top:1.1rem;}
  .card-title{font-size:14px;font-weight:600;margin-bottom:.85rem;}

  /* FORM FIELDS */
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .ff label{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
  .ff input,.ff select{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:'IBM Plex Sans',sans-serif;-webkit-appearance:none;}

  /* BTN */
  .btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;}
  .btn:active{opacity:.85;}
  .btn-green{background:var(--accent);color:#fff;margin-top:.85rem;}
  .btn-excel{background:#217346;color:#fff;}
  .btn-pdf{background:#9b2226;color:#fff;}
  .btn-back{background:var(--gray-l);color:var(--muted);border:1px solid var(--border);}
  .btn-stack{display:flex;flex-direction:column;gap:8px;margin-top:.85rem;}

  /* PROGRESS */
  .prog-wrap{margin-bottom:1.1rem;}
  .prog-top{display:flex;justify-content:space-between;margin-bottom:5px;}
  .prog-top span{font-size:12px;color:var(--muted);}
  .prog-top strong{font-size:12px;font-weight:600;font-family:'IBM Plex Mono';color:var(--accent);}
  .prog-bar{height:5px;background:var(--border);border-radius:3px;}
  .prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s;}

  /* PUNTO */
  .pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:.9rem;}
  .pc.active{border:1.5px solid var(--accent);}
  .pc.ok{border-left:4px solid var(--accent);}
  .pc.ko{border-left:4px solid var(--danger);}
  .pc.na{border-left:4px solid var(--gray);}
  .pc-hdr{padding:.65rem .9rem;background:var(--gray-l);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .pc-num{font-family:'IBM Plex Mono';font-size:11px;color:var(--muted);}
  .tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.03em;}
  .tag-fab{background:var(--blue-l);color:var(--blue);}
  .tag-gest{background:var(--accent-l);color:var(--accent);}
  .tag-freq{background:var(--warn-l);color:var(--warn);}
  .tag-dur{background:var(--gray-l);color:var(--muted);}
  .pc-body{padding:.9rem;}
  .pc-fn{font-size:13px;font-weight:600;margin-bottom:5px;}
  .pc-como{font-size:12px;color:var(--muted);line-height:1.6;padding:7px 9px;background:var(--gray-l);border-radius:6px;border-left:3px solid var(--border);margin-bottom:10px;}
  .pc-como strong{color:var(--text);display:block;margin-bottom:2px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;}

  /* RESULT */
  .rrow{display:flex;gap:5px;margin-bottom:9px;}
  .rbtn{flex:1;padding:10px 4px;border-radius:7px;border:1.5px solid var(--border);cursor:pointer;font-size:12px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;background:var(--surface);color:var(--muted);text-align:center;}
  .rbtn-ok.sel{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
  .rbtn-ko.sel{background:var(--danger-l);border-color:var(--danger);color:var(--danger);}
  .rbtn-na.sel{background:var(--gray-l);border-color:var(--gray);color:var(--gray);}

  .obs{width:100%;padding:8px 9px;font-size:12px;line-height:1.6;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);resize:vertical;min-height:54px;font-family:'IBM Plex Sans',sans-serif;margin-bottom:8px;}

  /* MEDIA */
  .media-section{background:var(--gray-l);border-radius:8px;padding:9px;margin-bottom:4px;}
  .media-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px;}
  .media-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .mbtn{display:inline-flex;align-items:center;gap:5px;padding:8px 12px;border-radius:7px;border:1.5px dashed var(--border);cursor:pointer;font-size:12px;font-weight:500;color:var(--text);background:var(--surface);font-family:'IBM Plex Sans',sans-serif;}
  .mbtn:active{background:var(--gray-l);}
  .mbtn-rec{border-color:var(--danger);color:var(--danger);}
  .mbtn-rec.recording{background:var(--danger);color:#fff;border-style:solid;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}

  /* PREVIEWS */
  .foto-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
  .fthumb{position:relative;width:68px;height:68px;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
  .fthumb img{width:100%;height:100%;object-fit:cover;}
  .fdel{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;}

  .audio-list{margin-top:7px;display:flex;flex-direction:column;gap:5px;}
  .audio-item{display:flex;align-items:center;gap:7px;background:var(--surface);border-radius:6px;padding:6px 9px;border:1px solid var(--border);}
  .audio-item audio{flex:1;height:32px;}
  .audio-del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px;padding:2px 5px;}

  /* NAV */
  .nav-row{display:flex;gap:8px;align-items:center;margin-top:.5rem;flex-wrap:wrap;}
  .nbtn{padding:10px 16px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:500;font-family:'IBM Plex Sans',sans-serif;background:var(--surface);color:var(--text);}
  .nbtn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .nbtn-sm{padding:10px 11px;font-size:12px;margin-left:auto;}

  /* SUMMARY */
  .sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:1rem 0;}
  .stile{border-radius:8px;padding:13px;text-align:center;}
  .stile.ok{background:var(--accent-l);}.stile.ko{background:var(--danger-l);}.stile.na{background:var(--gray-l);}
  .snum{font-size:28px;font-weight:600;font-family:'IBM Plex Mono';}
  .stile.ok .snum{color:var(--accent);}.stile.ko .snum{color:var(--danger);}.stile.na .snum{color:var(--gray);}
  .slbl{font-size:11px;color:var(--muted);margin-top:2px;}
  .ko-item{padding:8px 9px;background:var(--danger-l);border-radius:6px;border-left:3px solid var(--danger);margin-bottom:5px;font-size:12px;color:var(--danger);}
  .divider{height:1px;background:var(--border);margin:.9rem 0;}
  .exp-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px;}

  .hidden{display:none!important;}

  @media print{
    .hdr,.nav-row,.btn,.media-section,.fdel,.audio-del{display:none!important;}
    body{background:#fff;}
    .pc{box-shadow:none;break-inside:avoid;}
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">🔍</div>
  <div><h1>Asistente de Auditoría</h1><p>Visores de tortillas — Delibreads</p></div>
</div>

<div class="wrap">

  <!-- SETUP -->
  <div id="setup-panel">
    <div class="card">
      <div class="card-title">Datos de la auditoría</div>
      <div class="fgrid">
        <div class="ff"><label>Fecha</label><input type="date" id="inp-fecha"/></div>
        <div class="ff"><label>Línea auditada</label><input type="text" id="inp-linea" placeholder="Ej: Línea 1"/></div>
        <div class="ff"><label>Auditor</label><input type="text" id="inp-auditor" placeholder="Tu nombre"/></div>
        <div class="ff"><label>Semana del mes</label>
          <select id="inp-semana">
            <option value="1">Semana 1 — semanales + mensuales</option>
            <option value="2">Semana 2 — solo semanales</option>
            <option value="3">Semana 3 — semanales + quincenales</option>
            <option value="4">Semana 4 — solo semanales</option>
          </select>
        </div>
      </div>
      <button class="btn btn-green" onclick="startAudit()">Iniciar auditoría →</button>
    </div>
  </div>

  <!-- AUDIT -->
  <div id="audit-panel" class="hidden">
    <div class="prog-wrap" style="margin-top:1.1rem;">
      <div class="prog-top">
        <span id="prog-label">0 de 0 completados</span>
        <strong id="prog-pct">0%</strong>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div id="puntos-container"></div>
    <div class="nav-row" id="nav-row">
      <button class="nbtn" id="btn-prev" onclick="navigate(-1)">← Anterior</button>
      <button class="nbtn nbtn-primary" id="btn-next" onclick="navigate(1)">Siguiente →</button>
      <button class="nbtn nbtn-sm" onclick="showAll()">Ver todos</button>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="summary-panel" class="hidden">
    <div class="card">
      <div class="card-title" id="sum-title">Resumen de auditoría</div>
      <div class="sgrid">
        <div class="stile ok"><div class="snum" id="s-ok">-</div><div class="slbl">Correctos</div></div>
        <div class="stile ko"><div class="snum" id="s-ko">-</div><div class="slbl">Incidencias</div></div>
        <div class="stile na"><div class="snum" id="s-na">-</div><div class="slbl">No aplica</div></div>
      </div>
      <div id="ko-list"></div>
      <div class="divider"></div>
      <div class="exp-title">💾 Guardar informe</div>
      <div class="btn-stack">
        <button class="btn btn-excel" onclick="exportExcel()">⬇ Descargar Excel (.xlsx)</button>
        <button class="btn btn-pdf" onclick="window.print()">🖨️ Guardar como PDF</button>
      </div>
      <div class="divider"></div>
      <button class="btn btn-back" onclick="backToAudit()">← Volver a revisar puntos</button>
    </div>
  </div>

</div><!-- /wrap -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const PUNTOS=[
  {id:1,bloque:'Fabricar',funcion:'Asegurar calidad de producto',
   compromiso:'Verificar si los visores de tortillas están funcionando correctamente, realizando pruebas periódicas y asegurando que el sistema detecte y rechace las piezas defectuosas.',
   como:'Falso rechazo: hacer un muestreo del rechazo, durante 10 minutos, para comprobar si las tortillas han sido correctamente expulsadas en una de las líneas. Comprobar que en la aplicación aparecen todos los defectos que esa tortilla tiene.',
   duracion:30,frecuencia:'Semanal',semanas:[1,2,3,4]},
  {id:2,bloque:'Fabricar',funcion:'Asegurar calidad de producto',
   compromiso:'Verificar si los visores de tortillas están funcionando correctamente, realizando pruebas periódicas y asegurando que el sistema detecte y rechace las piezas defectuosas.',
   como:'Verificación de expulsión: pasar una mancha azul y una negra (rotulador ~5mm²) tanto para la cámara superior como la inferior, por todos los carriles. Comprobar en una de las líneas.',
   duracion:20,frecuencia:'Semanal',semanas:[1,2,3,4]},
  {id:3,bloque:'Fabricar',funcion:'Asegurar calidad de producto',
   compromiso:'Verificar si los visores de tortillas están funcionando correctamente, realizando pruebas periódicas y asegurando que el sistema detecte y rechace las piezas defectuosas.',
   como:'Verificación de expulsión: coger, durante dos minutos, montones de tortillas que salen de la contadora y comprobar que no hay franjas crudas. Comprobar en una de las líneas.',
   duracion:10,frecuencia:'Semanal',semanas:[1,2,3,4]},
  {id:4,bloque:'Fabricar',funcion:'Asegurar calidad de producto',
   compromiso:'Verificar si los visores de tortillas están funcionando correctamente, realizando pruebas periódicas y asegurando que el sistema detecte y rechace las piezas defectuosas.',
   como:'Verificación de expulsión: comprobar que se expulsan correctamente tortillas KO de tipo: churro, hamburguesa, doble, pequeña, grande, borde recto, irregularidad, agujero y translucidez total. Comprobar en una de las líneas.',
   duracion:20,frecuencia:'Mensual',semanas:[1]},
  {id:5,bloque:'Fabricar',funcion:'Asegurar calidad de producto',
   compromiso:'Realizar el seguimiento de las incidencias y mejoras de los visores, registrando, monitorizando y actualizando su estado, colaborando con los equipos correspondientes para asegurar su pronta resolución y el cumplimiento de los plazos establecidos.',
   como:'Seleccionar tres JE y hacer preguntas sobre un método, comprobando así su correcto entendimiento.',
   duracion:30,frecuencia:'Semanal',semanas:[1,2,3,4]},
  {id:6,bloque:'Fabricar',funcion:'Asegurar calidad de producto',
   compromiso:'Realizar el seguimiento de las incidencias y mejoras de los visores, registrando, monitorizando y actualizando su estado, colaborando con los equipos correspondientes para asegurar su pronta resolución y el cumplimiento de los plazos establecidos.',
   como:'Provocar las incidencias o mejoras resueltas la semana anterior en la línea donde no ha sido expulsada.',
   duracion:60,frecuencia:'Quincenal',semanas:[1,3]},
  {id:7,bloque:'Fabricar',funcion:'Asegurar calidad de producto',
   compromiso:'Realizar el seguimiento de las incidencias y mejoras de los visores, registrando, monitorizando y actualizando su estado, colaborando con los equipos correspondientes para asegurar su pronta resolución y el cumplimiento de los plazos establecibles.',
   como:'Provocar los inputs de calidad o internos del último mes y registrar su estado en la línea donde no ha sido expulsada.',
   duracion:60,frecuencia:'Mensual',semanas:[1]},
  {id:8,bloque:'Fabricar',funcion:'Asegurar calidad de producto',
   compromiso:'Ajustar nivel de rechazo a nivel de tolerancias, calibrando los parámetros del sistema para garantizar que las tolerancias de aceptación y rechazo estén correctamente configuradas, reduciendo al mínimo los rechazos innecesarios sin comprometer la calidad del producto.',
   como:'Ir al visor y ver que las tolerancias son las definidas por AO en una de las líneas.',
   duracion:10,frecuencia:'Mensual',semanas:[1]},
  {id:9,bloque:'Gestionar equipos',funcion:'Formación y polivalencia',
   compromiso:'Realizar formaciones/informaciones de funcionalidades de los visores, diseñando y llevando a cabo sesiones formativas para capacitar a los usuarios en el uso y aprovechamiento de las funcionalidades, asegurando una correcta implementación y comprensión.',
   como:'Comprobar que no existe ningún JE (nuevo o antiguo) que no haya recibido la información. Preguntar a JT-JE que saben interpretar correctamente los problemas/pantallas del visor.',
   duracion:15,frecuencia:'Quincenal',semanas:[1,3]},
  {id:10,bloque:'Gestionar equipos',funcion:'Formación y polivalencia',
   compromiso:'Realizar formaciones/informaciones de funcionalidades de los visores, diseñando y llevando a cabo sesiones formativas para capacitar a los usuarios en el uso y aprovechamiento de las funcionalidades, asegurando una correcta implementación y comprensión.',
   como:'Comprobar que los manuales están actualizados.',
   duracion:30,frecuencia:'Mensual',semanas:[1]}
];

let results={}, currentIdx=0, viewAll=false, semanaActual=1, puntosActivos=[], auditInfo={};
let mediaRecorders={}, audioChunks={}, recordingId=null;

function getISOWeek(d){
  const dt=new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate()+4-(dt.getDay()||7));
  const y=new Date(dt.getFullYear(),0,1);
  return Math.ceil((((dt-y)/86400000)+1)/7);
}

function startAudit(){
  auditInfo={
    fecha:document.getElementById('inp-fecha').value||new Date().toISOString().split('T')[0],
    linea:document.getElementById('inp-linea').value||'—',
    auditor:document.getElementById('inp-auditor').value||'—',
  };
  semanaActual=parseInt(document.getElementById('inp-semana').value);
  puntosActivos=PUNTOS.filter(p=>p.semanas.includes(semanaActual));
  document.getElementById('setup-panel').classList.add('hidden');
  document.getElementById('audit-panel').classList.remove('hidden');
  currentIdx=0; renderCurrent();
}

function buildPunto(p, idx, isActive){
  const r=results[p.id]||{};
  const estado=r.estado||'';
  const obs=r.obs||'';
  const fotos=r.fotos||[];
  const audios=r.audios||[];
  const cls=estado==='OK'?'ok':estado==='KO'?'ko':estado==='N/A'?'na':isActive?'active':'';
  const tb=p.bloque==='Fabricar'?'tag-fab':'tag-gest';

  const fotosHTML=fotos.length
    ?`<div class="foto-grid">${fotos.map((f,fi)=>`<div class="fthumb"><img src="${f.data}"/><button class="fdel" onclick="delFoto(${p.id},${fi})">✕</button></div>`).join('')}</div>`:'';

  const audiosHTML=audios.length
    ?`<div class="audio-list">${audios.map((a,ai)=>`<div class="audio-item"><audio controls src="${a.data}"></audio><button class="audio-del" onclick="delAudio(${p.id},${ai})">🗑</button></div>`).join('')}</div>`:'';

  const isRec=recordingId===p.id;

  return `<div class="pc ${cls}" id="pc-${p.id}">
    <div class="pc-hdr">
      <span class="pc-num">Punto ${idx+1}/${puntosActivos.length}</span>
      <span class="tag ${tb}">${p.bloque}</span>
      <span class="tag tag-freq">${p.frecuencia}</span>
      <span class="tag tag-dur">${p.duracion} min</span>
    </div>
    <div class="pc-body">
      <div class="pc-fn">${p.funcion}</div>
      <div class="pc-como"><strong>Cómo verificar</strong>${p.como}</div>
      <div class="rrow">
        <button class="rbtn rbtn-ok ${estado==='OK'?'sel':''}" onclick="setEstado(${p.id},'OK')">✓ Correcto</button>
        <button class="rbtn rbtn-ko ${estado==='KO'?'sel':''}" onclick="setEstado(${p.id},'KO')">✗ Incidencia</button>
        <button class="rbtn rbtn-na ${estado==='N/A'?'sel':''}" onclick="setEstado(${p.id},'N/A')">— No aplica</button>
      </div>
      <textarea class="obs" id="obs-${p.id}" placeholder="Observaciones: qué has visto, tiempos reales, diferencias..." onchange="saveObs(${p.id})">${obs}</textarea>

      <div class="media-section">
        <div class="media-title">📎 Evidencias</div>
        <div class="media-btns">
          <label class="mbtn" for="fi-${p.id}">
            📷 Foto
            <input type="file" id="fi-${p.id}" accept="image/*" capture="environment" style="display:none" onchange="addFoto(${p.id},this)"/>
          </label>
          <label class="mbtn" for="fg-${p.id}">
            🖼 Galería
            <input type="file" id="fg-${p.id}" accept="image/*" multiple style="display:none" onchange="addFotoGaleria(${p.id},this)"/>
          </label>
          <button class="mbtn mbtn-rec ${isRec?'recording':''}" id="rec-btn-${p.id}" onclick="toggleRecord(${p.id})">
            🎙 ${isRec?'Parar':'Grabar audio'}
          </button>
          <label class="mbtn" for="au-${p.id}">
            📂 Audio
            <input type="file" id="au-${p.id}" accept="audio/*" multiple style="display:none" onchange="addAudioFile(${p.id},this)"/>
          </label>
        </div>
        ${fotosHTML}
        ${audiosHTML}
      </div>
    </div>
  </div>`;
}

// ---- FOTO ----
function addFoto(id, input){
  if(!input.files||!input.files[0])return;
  readAndSaveFoto(id, input.files[0]);
}
function addFotoGaleria(id, input){
  if(!input.files||!input.files.length)return;
  Array.from(input.files).forEach(f=>readAndSaveFoto(id,f));
}
function readAndSaveFoto(id, file){
  const reader=new FileReader();
  reader.onload=e=>{
    if(!results[id])results[id]={};
    if(!results[id].fotos)results[id].fotos=[];
    results[id].fotos.push({name:file.name||`foto_${Date.now()}.jpg`, data:e.target.result});
    // Auto-save to device gallery
    autoDownload(e.target.result, `auditoria_p${id}_${Date.now()}.jpg`);
    viewAll?reRenderAll():renderCurrent();
  };
  reader.readAsDataURL(file);
}
function delFoto(id,fi){
  if(results[id]?.fotos){results[id].fotos.splice(fi,1);viewAll?reRenderAll():renderCurrent();}
}

// ---- AUDIO RECORDING ----
async function toggleRecord(id){
  if(recordingId===id){
    // Stop recording
    if(mediaRecorders[id]&&mediaRecorders[id].state!=='inactive'){
      mediaRecorders[id].stop();
    }
    return;
  }
  // Stop any other recording first
  if(recordingId!==null&&mediaRecorders[recordingId]){
    mediaRecorders[recordingId].stop();
  }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks[id]=[];
    const mr=new MediaRecorder(stream);
    mediaRecorders[id]=mr;
    recordingId=id;
    mr.ondataavailable=e=>{if(e.data.size>0)audioChunks[id].push(e.data);};
    mr.onstop=()=>{
      const blob=new Blob(audioChunks[id],{type:'audio/webm'});
      const reader=new FileReader();
      reader.onload=ev=>{
        if(!results[id])results[id]={};
        if(!results[id].audios)results[id].audios=[];
        const fname=`audio_p${id}_${Date.now()}.webm`;
        results[id].audios.push({name:fname, data:ev.target.result});
        // Auto-save to device
        autoDownload(ev.target.result, fname);
        recordingId=null;
        stream.getTracks().forEach(t=>t.stop());
        viewAll?reRenderAll():renderCurrent();
      };
      reader.readAsDataURL(blob);
    };
    mr.start();
    viewAll?reRenderAll():renderCurrent();
  }catch(err){
    alert('No se pudo acceder al micrófono. Asegúrate de dar permiso al navegador.\n\nError: '+err.message);
    recordingId=null;
  }
}

function addAudioFile(id, input){
  if(!input.files||!input.files.length)return;
  Array.from(input.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      if(!results[id])results[id]={};
      if(!results[id].audios)results[id].audios=[];
      results[id].audios.push({name:file.name, data:e.target.result});
      viewAll?reRenderAll():renderCurrent();
    };
    reader.readAsDataURL(file);
  });
}
function delAudio(id,ai){
  if(results[id]?.audios){results[id].audios.splice(ai,1);viewAll?reRenderAll():renderCurrent();}
}

// Auto-download helper — saves file to device Downloads/Gallery
function autoDownload(dataUrl, filename){
  try{
    const a=document.createElement('a');
    a.href=dataUrl; a.download=filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
  }catch(e){console.warn('Auto-download failed',e);}
}

// ---- CORE ----
function setEstado(id,estado){
  if(!results[id])results[id]={};
  results[id].estado=estado;
  const obs=document.getElementById('obs-'+id);
  if(obs)results[id].obs=obs.value;
  viewAll?reRenderAll():renderCurrent();
  updateProgress();
}
function saveObs(id){
  if(!results[id])results[id]={};
  const o=document.getElementById('obs-'+id);
  if(o)results[id].obs=o.value;
}
function renderCurrent(){
  viewAll=false;
  document.getElementById('puntos-container').innerHTML=buildPunto(puntosActivos[currentIdx],currentIdx,true);
  document.getElementById('btn-prev').style.display=currentIdx===0?'none':'';
  document.getElementById('btn-next').textContent=currentIdx===puntosActivos.length-1?'Ver resumen →':'Siguiente →';
  document.getElementById('nav-row').classList.remove('hidden');
  updateProgress();
}
function reRenderAll(){
  document.getElementById('puntos-container').innerHTML=puntosActivos.map((p,i)=>buildPunto(p,i,false)).join('');
}
function showAll(){
  viewAll=true; reRenderAll();
  document.getElementById('nav-row').classList.add('hidden');
  updateProgress();
}
function navigate(dir){
  saveObs(puntosActivos[currentIdx].id);
  if(dir===1&&currentIdx===puntosActivos.length-1){showSummary();return;}
  currentIdx=Math.max(0,Math.min(puntosActivos.length-1,currentIdx+dir));
  renderCurrent();
}
function updateProgress(){
  const done=puntosActivos.filter(p=>results[p.id]?.estado).length;
  const pct=Math.round(done/puntosActivos.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`${done} de ${puntosActivos.length} completados`;
  document.getElementById('prog-pct').textContent=pct+'%';
}
function showSummary(){
  saveObs(puntosActivos[currentIdx]?.id);
  document.getElementById('audit-panel').classList.add('hidden');
  document.getElementById('summary-panel').classList.remove('hidden');
  const week=getISOWeek(auditInfo.fecha);
  const year=new Date(auditInfo.fecha).getFullYear();
  document.getElementById('sum-title').textContent=`Auditoría · ${auditInfo.linea} · Semana ${week}/${year}`;
  const ok=puntosActivos.filter(p=>results[p.id]?.estado==='OK').length;
  const ko=puntosActivos.filter(p=>results[p.id]?.estado==='KO').length;
  const na=puntosActivos.filter(p=>results[p.id]?.estado==='N/A').length;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-ko').textContent=ko;
  document.getElementById('s-na').textContent=na;
  const koItems=puntosActivos.filter(p=>results[p.id]?.estado==='KO');
  document.getElementById('ko-list').innerHTML=koItems.length
    ?'<div style="margin-bottom:.4rem;font-size:12px;font-weight:600;color:var(--danger)">Incidencias:</div>'+
      koItems.map(p=>`<div class="ko-item"><strong>Punto ${puntosActivos.indexOf(p)+1}:</strong> ${p.funcion}<br><span style="opacity:.75">${results[p.id]?.obs||'Sin observaciones'}</span></div>`).join('')
    :'<p style="font-size:12px;color:var(--accent);padding:6px 0">✓ Sin incidencias detectadas</p>';
}
function backToAudit(){
  document.getElementById('summary-panel').classList.add('hidden');
  document.getElementById('audit-panel').classList.remove('hidden');
  renderCurrent();
}
function exportExcel(){
  const week=getISOWeek(auditInfo.fecha);
  const year=new Date(auditInfo.fecha).getFullYear();
  const completed=puntosActivos.filter(p=>['OK','KO'].includes(results[p.id]?.estado));
  if(!completed.length){alert('No hay puntos completados todavía.');return;}
  const rows=completed.map((p,i)=>{
    const r=results[p.id]||{};
    return{
      'Fecha':auditInfo.fecha,
      'Línea':auditInfo.linea,
      'Auditor':auditInfo.auditor,
      'Semana año':`Semana ${week}/${year}`,
      'Nº':i+1,
      'Bloque':p.bloque,
      'Función':p.funcion,
      'Compromiso':p.compromiso,
      'Cómo verificar':p.como,
      'Frecuencia':p.frecuencia,
      'Resultado':r.estado||'',
      'Observaciones':r.obs||'',
      'Fotos adjuntas':r.fotos?.length?r.fotos.map(f=>f.name).join(', '):'',
      'Audios adjuntos':r.audios?.length?r.audios.map(a=>a.name).join(', '):'',
      'Plan de acción':''
    };
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[12,12,16,14,4,16,22,40,50,12,12,40,30,30,40].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Auditoría');
  XLSX.writeFile(wb,`Auditoria_${auditInfo.linea.replace(/\s/g,'')}_Sem${week}_${auditInfo.fecha}.xlsx`);
}

document.getElementById('inp-fecha').value=new Date().toISOString().split('T')[0];
</script>
