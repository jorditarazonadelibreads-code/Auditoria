<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Auditoría Visores — Delibreads</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');
  :root{
    --bg:#f5f4f0;--surface:#fff;--border:#e0ddd6;--text:#1a1916;--muted:#6b6860;
    --accent:#1a5c3a;--accent-l:#e8f3ed;--danger:#b83232;--danger-l:#fdf0f0;
    --warn:#8a6000;--warn-l:#fef9ec;--gray:#9a9790;--gray-l:#f0efe9;
    --blue:#1e4d8c;--blue-l:#edf2fb;--r:10px;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

  .hdr{background:var(--accent);padding:.85rem 1.1rem;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20;}
  .hdr-logo{width:34px;height:34px;background:rgba(255,255,255,.18);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .hdr h1{font-size:14px;font-weight:600;color:#fff;letter-spacing:-0.01em;}

  .wrap{padding:1.1rem;max-width:680px;margin:0 auto;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;box-shadow:var(--shadow);margin-top:1.1rem;}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .ff label{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-bottom:3px;text-transform:uppercase;}
  .ff input,.ff select{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border);border-radius:6px;}

  .btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
  .btn-green{background:var(--accent);color:#fff;}
  .btn-excel{background:#217346;color:#fff;margin-top:10px;}
  .btn-back{background:var(--gray-l);color:var(--muted);border:1px solid var(--border);}

  .prog-bar{height:5px;background:var(--border);border-radius:3px;margin-bottom:15px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s;}

  .pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);margin-bottom:.9rem;}
  .pc-hdr{padding:.65rem .9rem;background:var(--gray-l);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px;}
  .pc-body{padding:.9rem;}
  .pc-fn{font-size:13px;font-weight:600;margin-bottom:5px;}
  .pc-como{font-size:12px;color:var(--muted);background:var(--gray-l);padding:8px;border-radius:6px;margin-bottom:10px;line-height:1.4;}
  
  .rrow{display:flex;gap:5px;margin-bottom:9px;}
  .rbtn{flex:1;padding:10px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-weight:600;font-size:12px;}
  .rbtn-ok.sel{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
  .rbtn-ko.sel{background:var(--danger-l);border-color:var(--danger);color:var(--danger);}

  .obs{width:100%;padding:8px;font-size:12px;border:1px solid var(--border);border-radius:6px;min-height:60px;margin-bottom:8px;font-family:inherit;}

  .media-section{background:var(--gray-l);border-radius:8px;padding:10px;margin-top:10px;}
  .media-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .mbtn{background:#fff;border:1px dashed var(--border);padding:8px;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;flex:1;justify-content:center;font-weight:500;}
  .mbtn-rec.recording{background:var(--danger);color:#fff;border-style:solid;}

  .foto-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .fthumb{position:relative;width:60px;height:60px;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
  .fthumb img{width:100%;height:100%;object-fit:cover;}
  .fdel{position:absolute;top:0;right:0;background:rgba(0,0,0,0.5);color:#fff;border:none;width:18px;height:18px;font-size:10px;}

  .audio-list{margin-top:7px;display:flex;flex-direction:column;gap:5px;}
  .audio-item{display:flex;align-items:center;gap:5px;background:#fff;padding:5px;border-radius:4px;border:1px solid var(--border);}
  .audio-item audio{flex:1;height:30px;}

  .quick-nav{display:flex;gap:8px;margin-top:1.2rem;position:sticky;bottom:1rem;z-index:10;}
  .nav-row{display:flex;gap:8px;margin-top:10px;}
  .hidden{display:none!important;}
</style>
</head>
<body>

<div class="hdr"><div class="hdr-logo">🔍</div><h1>Asistente de Auditoría - Delibreads</h1></div>

<div class="wrap">
  <div id="setup-panel">
    <div class="card">
      <div class="fgrid">
        <div class="ff"><label>Fecha</label><input type="date" id="inp-fecha"/></div>
        <div class="ff">
          <label>Línea</label>
          <select id="inp-linea">
            <option>Línea 1</option><option>Línea 2</option><option>Línea 3</option><option>Línea 4</option>
          </select>
        </div>
        <div class="ff"><label>Auditor</label><input type="text" id="inp-auditor" placeholder="Nombre..."/></div>
        <div class="ff">
          <label>Semana</label>
          <select id="inp-semana">
            <option value="1">Semana 1</option><option value="2">Semana 2</option><option value="3">Semana 3</option><option value="4">Semana 4</option>
          </select>
        </div>
      </div>
      <button class="btn btn-green" style="margin-top:1.2rem" onclick="startAudit()">Comenzar Auditoría →</button>
    </div>
  </div>

  <div id="audit-panel" class="hidden">
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div id="puntos-container"></div>

    <div class="nav-row">
      <button class="btn btn-back" style="flex:1" onclick="navigate(-1)">← Anterior</button>
      <button class="btn btn-green" style="flex:1" onclick="navigate(1)">Siguiente →</button>
    </div>

    <div class="quick-nav">
       <button class="btn btn-excel" onclick="exportExcel()" style="flex:2">📥 GUARDAR EXCEL</button>
       <button class="btn btn-back" onclick="showSummary()" style="flex:1">Finalizar</button>
    </div>
  </div>

  <div id="summary-panel" class="hidden">
    <div class="card">
      <button class="btn btn-excel" onclick="exportExcel()">⬇ DESCARGAR INFORME FINAL (.xlsx)</button>
      <button class="btn btn-back" onclick="backToAudit()" style="margin-top:10px;">← Revisar puntos</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const PUNTOS = [
  {id:1, bloque:'Fabricar', funcion:'Calidad', compromiso:'Asegurar Calidad', como:'Falso rechazo: muestreo 10 min.', semanas:[1,2,3,4]},
  {id:2, bloque:'Fabricar', funcion:'Calidad', compromiso:'Asegurar Calidad', como:'Verificación mancha azul/negra.', semanas:[1,2,3,4]},
  {id:3, bloque:'Fabricar', funcion:'Calidad', compromiso:'Asegurar Calidad', como:'Ausencia franjas crudas.', semanas:[1,2,3,4]},
  {id:4, bloque:'Fabricar', funcion:'Incidencias', compromiso:'Seguimiento', como:'Preguntar a 3 JE sobre método.', semanas:[1,2,3,4]},
  {id:5, bloque:'Equipos', funcion:'Formación', compromiso:'Capacitación', como:'JE interpretan pantallas.', semanas:[1,3]}
];

let results = {}, currentIdx = 0, puntosActivos = [], auditInfo = {}, recorder = null, chunks = [], recordingId = null;

function startAudit(){
  auditInfo = { fecha: document.getElementById('inp-fecha').value, linea: document.getElementById('inp-linea').value, auditor: document.getElementById('inp-auditor').value };
  puntosActivos = PUNTOS.filter(p => p.semanas.includes(parseInt(document.getElementById('inp-semana').value)));
  document.getElementById('setup-panel').classList.add('hidden');
  document.getElementById('audit-panel').classList.remove('hidden');
  renderCurrent();
}

function renderCurrent(){
  const p = puntosActivos[currentIdx];
  const r = results[p.id] || { estado:'', obs:'', fotos:[], audios:[] };
  const isRec = recordingId === p.id;

  document.getElementById('puntos-container').innerHTML = `
    <div class="pc">
      <div class="pc-hdr"><span>PUNTO ${currentIdx+1}/${puntosActivos.length}</span><strong>${p.bloque}</strong></div>
      <div class="pc-body">
        <div class="pc-fn">${p.funcion}</div>
        <div class="pc-como"><strong>CÓMO:</strong> ${p.como}</div>
        <div class="rrow">
          <button class="rbtn rbtn-ok ${r.estado==='OK'?'sel':''}" onclick="setEstado(${p.id},'OK')">✓ CONFORME</button>
          <button class="rbtn rbtn-ko ${r.estado==='KO'?'sel':''}" onclick="setEstado(${p.id},'KO')">✗ NO CONFORME</button>
        </div>
        <textarea class="obs" onchange="saveObs(${p.id},this.value)" placeholder="Observaciones...">${r.obs}</textarea>
        <div class="media-section">
          <div class="media-btns">
            <label class="mbtn">📷 Foto<input type="file" accept="image/*" capture="environment" hidden onchange="addFoto(${p.id},this)"></label>
            <button class="mbtn mbtn-rec ${isRec?'recording':''}" onclick="toggleAudio(${p.id})">
              ${isRec ? '⏹ Parar' : '🎙 Grabar Audio'} (${r.audios.length})
            </button>
          </div>
          <div class="foto-grid">${r.fotos.map((f,i)=>`<div class="fthumb"><img src="${f}"><button class="fdel" onclick="delFoto(${p.id},${i})">✕</button></div>`).join('')}</div>
          <div class="audio-list">${r.audios.map((a,i)=>`<div class="audio-item"><audio src="${a}" controls></audio><button onclick="delAudio(${p.id},${i})">🗑</button></div>`).join('')}</div>
        </div>
      </div>
    </div>`;
  updateProgress();
}

function setEstado(id,v){ if(!results[id]) results[id]={estado:'',obs:'',fotos:[],audios:[]}; results[id].estado=v; renderCurrent(); }
function saveObs(id,v){ if(!results[id]) results[id]={estado:'',obs:'',fotos:[],audios:[]}; results[id].obs=v; }

function addFoto(id,input){
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = (e) => {
    if(!results[id]) results[id]={estado:'',obs:'',fotos:[],audios:[]};
    results[id].fotos.push(e.target.result);
    renderCurrent();
  };
  reader.readAsDataURL(file);
}

function delFoto(id,i){ results[id].fotos.splice(i,1); renderCurrent(); }

async function toggleAudio(id){
  if(recordingId === id){ recorder.stop(); return; }
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  recorder = new MediaRecorder(stream);
  chunks = [];
  recordingId = id;
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: 'audio/webm' });
    const reader = new FileReader();
    reader.onload = (e) => {
      if(!results[id]) results[id]={estado:'',obs:'',fotos:[],audios:[]};
      results[id].audios.push(e.target.result);
      recordingId = null;
      renderCurrent();
    };
    reader.readAsDataURL(blob);
    stream.getTracks().forEach(t => t.stop());
  };
  recorder.start();
  renderCurrent();
}

function delAudio(id,i){ results[id].audios.splice(i,1); renderCurrent(); }
function navigate(d){ let n=currentIdx+d; if(n>=0 && n<puntosActivos.length){currentIdx=n;renderCurrent();} else if(n>=puntosActivos.length)showSummary(); }
function updateProgress(){ const done=puntosActivos.filter(p=>results[p.id]?.estado).length; document.getElementById('prog-fill').style.width=(done/puntosActivos.length*100)+'%'; }
function showSummary(){ document.getElementById('audit-panel').classList.add('hidden'); document.getElementById('summary-panel').classList.remove('hidden'); }
function backToAudit(){ document.getElementById('summary-panel').classList.add('hidden'); document.getElementById('audit-panel').classList.remove('hidden'); }

function exportExcel(){
  const rows = puntosActivos.map((p,i)=>({
    'Fecha': auditInfo.fecha, 'Línea': auditInfo.linea, 'Auditor': auditInfo.auditor, 'Bloque': p.bloque, 'Función': p.funcion,
    'Resultado': results[p.id]?.estado || 'PENDIENTE', 'Observaciones': results[p.id]?.obs || '', 
    'Fotos': results[p.id]?.fotos.length || 0, 'Audios': results[p.id]?.audios.length || 0
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Auditoria");
  XLSX.writeFile(wb, `Auditoria_${auditInfo.linea}_${auditInfo.fecha}.xlsx`);
}

document.getElementById('inp-fecha').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
