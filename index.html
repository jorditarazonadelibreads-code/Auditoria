<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Auditoría Visores — Delibreads</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');
  :root{
    --bg:#f5f4f0;--surface:#fff;--border:#e0ddd6;--text:#1a1916;--muted:#6b6860;
    --accent:#1a5c3a;--accent-l:#e8f3ed;--danger:#b83232;--danger-l:#fdf0f0;
    --gray:#9a9790;--gray-l:#f0efe9;--r:10px;
    --shadow:0 4px 12px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);padding-bottom:100px;}
  .hdr{background:var(--accent);padding:1rem;color:#fff;position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;}
  .wrap{padding:1rem;max-width:600px;margin:0 auto;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;box-shadow:var(--shadow);margin-bottom:1rem;}
  .ff label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px;text-transform:uppercase;}
  .ff input, .ff select{width:100%;padding:10px;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;font-size:14px;}
  .pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:1rem;overflow:hidden;}
  .pc-hdr{padding:8px 12px;background:var(--gray-l);font-size:12px;font-weight:600;display:flex;justify-content:space-between;}
  .pc-body{padding:12px;}
  .pc-como{font-size:13px;color:var(--muted);background:#f9f8f4;padding:10px;border-radius:6px;margin:10px 0;line-height:1.4;border-left:3px solid var(--accent);}
  .rrow{display:flex;gap:8px;margin:10px 0;}
  .rbtn{flex:1;padding:12px;border-radius:8px;border:1px solid var(--border);background:#fff;font-weight:600;cursor:pointer;}
  .rbtn-ok.sel{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
  .rbtn-ko.sel{background:var(--danger-l);border-color:var(--danger);color:var(--danger);}
  textarea{width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);font-family:inherit;font-size:13px;min-height:70px;}
  .media-box{margin-top:12px;background:var(--gray-l);padding:10px;border-radius:8px;}
  .m-btns{display:flex;gap:8px;}
  .btn-m{flex:1;padding:8px;background:#fff;border:1px dashed var(--border);border-radius:6px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;}
  .btn-m.recording{background:var(--danger);color:#fff;animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:0.6}}
  .f-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
  .f-thumb{width:60px;height:60px;border-radius:4px;object-fit:cover;border:1px solid var(--border);}
  .btn-main{width:100%;padding:15px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;}
  .btn-go{background:var(--accent);color:#fff;}
  .btn-xl{background:#217346;color:#fff;}
  .hidden{display:none;}
  .footer-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:15px;border-top:1px solid var(--border);display:flex;gap:10px;}
</style>
</head>
<body>

<div class="hdr"><h1>Auditoría Visores</h1></div>

<div class="wrap">
  <div id="setup">
    <div class="card">
      <div class="ff"><label>Fecha</label><input type="date" id="i-fecha"></div>
      <div class="ff"><label>Línea</label><select id="i-linea"><option>Línea 1</option><option>Línea 2</option><option>Línea 3</option></select></div>
      <div class="ff"><label>Auditor</label><input type="text" id="i-auditor" placeholder="Nombre..."></div>
      <div class="ff"><label>Semana</label><select id="i-semana"><option value="1">Semana 1</option><option value="2">Semana 2</option><option value="3">Semana 3</option><option value="4">Semana 4</option></select></div>
      <button class="btn-main btn-go" onclick="start()">Comenzar Auditoría →</button>
    </div>
  </div>

  <div id="audit" class="hidden">
    <div id="container"></div>
    <div class="footer-nav">
      <button class="btn-main" style="flex:1" onclick="nav(-1)">Anterior</button>
      <button class="btn-main btn-go" style="flex:1" onclick="nav(1)">Siguiente</button>
    </div>
  </div>

  <div id="summary" class="hidden">
    <div class="card">
      <h3>Auditoría Finalizada</h3>
      <p style="margin:10px 0; font-size:14px; color:var(--muted);">Pulsa el botón para generar el informe y enviar los datos.</p>
      <button class="btn-main btn-xl" onclick="exportReport()">📥 GENERAR EXCEL Y ENVIAR</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const PUNTOS = [
  {id:1, b:'Fabricar', f:'Calidad', c:'Falso rechazo: muestreo 10 min.', s:[1,2,3,4]},
  {id:2, b:'Fabricar', f:'Calidad', c:'Verificación mancha azul/negra.', s:[1,2,3,4]},
  {id:3, b:'Fabricar', f:'Calidad', c:'Ausencia franjas crudas.', s:[1,2,3,4]},
  {id:4, b:'Fabricar', f:'Incidencias', c:'Preguntar a 3 JE sobre método.', s:[1,2,3,4]},
  {id:5, b:'Equipos', f:'Formación', c:'JE interpretan pantallas.', s:[1,3]}
];

let current = 0, activos = [], results = {}, info = {}, recorder = null, chunks = [];

function start() {
  info = { fecha: document.getElementById('i-fecha').value, linea: document.getElementById('i-linea').value, auditor: document.getElementById('i-auditor').value };
  activos = PUNTOS.filter(p => p.s.includes(parseInt(document.getElementById('i-semana').value)));
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('audit').classList.remove('hidden');
  render();
}

function render() {
  const p = activos[current];
  const r = results[p.id] || { res: '', obs: '', fotos: [], audios: 0 };
  document.getElementById('container').innerHTML = `
    <div class="pc">
      <div class="pc-hdr"><span>PUNTO ${current + 1}/${activos.length}</span><span>${p.b}</span></div>
      <div class="pc-body">
        <div style="font-weight:600; font-size:14px;">${p.f}</div>
        <div class="pc-como">${p.c}</div>
        <div class="rrow">
          <button class="rbtn rbtn-ok ${r.res==='OK'?'sel':''}" onclick="saveRes(${p.id},'OK')">CONFORME</button>
          <button class="rbtn rbtn-ko ${r.res==='KO'?'sel':''}" onclick="saveRes(${p.id},'KO')">NO CONFORME</button>
        </div>
        <textarea placeholder="Notas y plan de acción..." onchange="saveObs(${p.id},this.value)">${r.obs}</textarea>
        <div class="media-box">
          <div class="m-btns">
            <label class="btn-m">📷 Foto<input type="file" accept="image/*" capture="environment" hidden onchange="addImg(${p.id},this)"></label>
            <button id="rec-${p.id}" class="btn-m" onclick="toggleRec(${p.id})">🎙️ Audio (${r.audios})</button>
          </div>
          <div class="f-grid" id="f-${p.id}">${r.fotos.map(f => `<img src="${f}" class="f-thumb">`).join('')}</div>
        </div>
      </div>
    </div>`;
}

function saveRes(id, v) { if(!results[id]) results[id]={res:'',obs:'',fotos:[],audios:0}; results[id].res=v; render(); }
function saveObs(id, v) { if(!results[id]) results[id]={res:'',obs:'',fotos:[],audios:0}; results[id].obs=v; }
function addImg(id, input) {
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = (e) => { 
    if(!results[id]) results[id]={res:'',obs:'',fotos:[],audios:0};
    results[id].fotos.push(e.target.result); 
    render(); 
  };
  reader.readAsDataURL(file);
}

async function toggleRec(id) {
  const btn = document.getElementById(`rec-${id}`);
  if (recorder && recorder.state === "recording") {
    recorder.stop();
    btn.classList.remove('recording');
  } else {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recorder = new MediaRecorder(stream);
    chunks = [];
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
      if(!results[id]) results[id]={res:'',obs:'',fotos:[],audios:0};
      results[id].audios++;
      render();
    };
    recorder.start();
    btn.classList.add('recording');
  }
}

function nav(d) {
  current += d;
  if (current < 0) current = 0;
  if (current >= activos.length) {
    document.getElementById('audit').classList.add('hidden');
    document.getElementById('summary').classList.remove('hidden');
  } else { render(); }
}

function exportReport() {
  const rows = activos.map((p, i) => ({
    'Fecha': info.fecha, 'Línea': info.linea, 'Auditor': info.auditor, 'Bloque': p.b, 'Resultado': results[p.id]?.res || 'Pte', 'Observaciones': results[p.id]?.obs || '', 'Evidencias': `${results[p.id]?.fotos.length || 0} fotos y ${results[p.id]?.audios || 0} audios`
  }));
  
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Auditoria");
  XLSX.writeFile(wb, `Informe_${info.linea}_${info.fecha}.xlsx`);

  // ENVIAR POR CORREO (Abre la app de correo con el resumen)
  const body = `Resumen Auditoría\nLínea: ${info.linea}\nFecha: ${info.fecha}\nAuditor: ${info.auditor}\n\nRevisar el Excel descargado y las fotos de la galería.`;
  window.location.href = `mailto:?subject=Auditoria ${info.linea}&body=${encodeURIComponent(body)}`;
}

document.getElementById('i-fecha').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
